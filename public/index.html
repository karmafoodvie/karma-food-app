<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a18;min-height:100vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;}
:root{--green:#0F6E56;--green-mid:#1D9E75;--green-light:#E1F5EE;--border:#e5e5e2;--muted:#888;--card:#fff;--sub:#666;--brand:#E0521F;--brand-light:#F5A57A;}

/* LOGIN */
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;gap:1.5rem;position:relative;background:var(--green);background-image:linear-gradient(180deg, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.25) 30%, rgba(15,110,86,0.92) 68%, rgba(15,110,86,1) 80%), url('/images/hero.jpg');background-size:cover;background-position:center top;}
.login-logo{color:#fff;font-size:30px;font-weight:400;font-family:'Boldonse',sans-serif;letter-spacing:1.5px;text-shadow:0 2px 14px rgba(0,0,0,0.35);}
.login-logo{color:#fff;font-size:30px;font-weight:400;font-family:'Boldonse',sans-serif;letter-spacing:1.5px;}
.tb-title{font-family:'Boldonse',sans-serif;font-weight:400 !important;letter-spacing:0.5px;}
.login-sub{color:#9FE1CB;font-size:14px;letter-spacing:0.3px;}
.login-card{background:#fff;border-radius:18px;padding:1.5rem;width:100%;max-width:320px;display:flex;flex-direction:column;gap:10px;box-shadow:0 12px 40px rgba(0,0,0,0.35);position:relative;z-index:1;}
.store-btn{padding:12px 16px;border:2px solid var(--border);border-radius:10px;background:#fff;font-size:14px;color:#1a1a18;cursor:pointer;text-align:left;display:flex;align-items:center;gap:10px;transition:border-color .15s;}
.store-btn:active{border-color:var(--brand);}
.store-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
.pin-input{width:100%;padding:12px;border:1.5px solid var(--border);border-radius:10px;font-size:18px;text-align:center;letter-spacing:4px;outline:none;}
.pin-input:focus{border-color:var(--brand);}
.login-btn{width:100%;padding:13px;background:var(--brand);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:500;cursor:pointer;}
.back-btn{background:transparent;border:none;color:var(--brand);font-size:14px;cursor:pointer;}

/* TOPBAR */
#topbar{background:var(--green);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.tb-title{font-weight:600;font-size:17px;}
.tb-sub{font-size:12px;color:#9FE1CB;margin-top:1px;}
.tb-avatar{width:34px;height:34px;border-radius:50%;background:var(--green-mid);display:flex;align-items:center;justify-content:center;color:#9FE1CB;font-size:11px;font-weight:600;}

/* LANG MENU */
.lang-btn{background:rgba(255,255,255,0.15);border:none;color:#fff;padding:5px 9px;border-radius:6px;font-size:14px;cursor:pointer;position:relative;}
#lang-menu{display:none;position:absolute;right:0;top:36px;background:#fff;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,0.15);z-index:999;min-width:150px;overflow:hidden;}
#lang-menu button{display:block;width:100%;padding:10px 14px;border:none;background:transparent;text-align:left;font-size:13px;cursor:pointer;color:#1a1a18;}
#lang-menu button:hover{background:#f5f5f3;}

/* CONTENT */
#content{flex:1;overflow-y:auto;padding:12px 12px 80px;}
.view{display:none;}
.view.show{display:block;}

/* BOTTOM NAV */
#bottomnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid var(--border);display:flex;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px;border:none;background:transparent;color:var(--muted);font-size:10px;cursor:pointer;}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.nav-btn.active{color:var(--green);}

/* CARDS */
.card{background:var(--card);border-radius:12px;border:1px solid var(--border);overflow:hidden;margin-bottom:10px;}
.card-header{padding:12px 14px;font-weight:500;font-size:14px;border-bottom:1px solid var(--border);}
.section-lbl{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.5px;padding:12px 2px 4px;text-transform:uppercase;}

/* ORDER */
.item-row{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--border);}
.item-row:last-child{border-bottom:none;}
.item-name{flex:1;font-size:14px;}
.item-unit{font-size:11px;color:var(--muted);}
.qty-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.qty-btn:active{background:var(--green-light);}
.qty-val{width:32px;text-align:center;font-size:15px;font-weight:500;color:var(--muted);}
.qty-val.has-val{color:var(--green);}
.submit-btn{width:100%;padding:14px;background:var(--green);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:500;cursor:pointer;margin-top:12px;}
.section-banner{border-left:3px solid;border-radius:0 8px 8px 0;padding:8px 12px;margin:14px 0 6px;display:flex;align-items:center;gap:8px;}

/* CHECKLIST */
.cl-tabs{display:flex;gap:6px;margin-bottom:10px;}
.cl-tab{flex:1;padding:8px;border:1.5px solid var(--border);border-radius:8px;background:#fff;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;text-align:center;}
.cl-tab.active{background:var(--green);border-color:var(--green);color:#fff;}
.cl-item{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;}
.cl-item:last-child{border-bottom:none;}
.cl-item:active{background:var(--green-light);}
.check-box{width:22px;height:22px;border-radius:5px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.check-box.done{background:var(--green);border-color:var(--green);}
.cl-text{font-size:14px;line-height:1.4;padding-top:1px;}
.cl-text.done{color:var(--muted);text-decoration:line-through;}
.progress-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:10px;}
.progress-fill{height:100%;background:var(--green);border-radius:3px;transition:width .3s;}
.progress-row{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:5px;}

/* PACK */
.pack-tabs{display:flex;gap:8px;margin-bottom:14px;}
.pack-tab{flex:1;padding:12px 8px;border:2px solid var(--border);border-radius:10px;background:var(--card);font-size:13px;font-weight:400;cursor:pointer;text-align:center;color:#1a1a18;}
.pack-table{width:100%;border-collapse:collapse;font-size:12px;}
.pack-table th{padding:6px;text-align:center;font-size:10px;color:var(--muted);border-bottom:1px solid var(--border);}
.pack-table th:first-child{text-align:left;}
.pack-table td{padding:7px 6px;border-bottom:1px solid var(--border);text-align:center;}
.pack-table td:first-child{text-align:left;font-size:13px;}

/* HOME */
.home-card{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:14px;margin-bottom:10px;cursor:pointer;}
.home-card:active{background:var(--green-light);}
.hc-icon{width:28px;height:28px;border-radius:8px;background:var(--green-light);display:flex;align-items:center;justify-content:center;}
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.metric-card{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:12px 14px;}
.badge{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:500;}
.badge-ok{background:#EAF3DE;color:#3B6D11;}
.badge-warn{background:#FCEBEB;color:#A32D2D;}
.badge-pend{background:#FAEEDA;color:#854F0B;}
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;padding:10px 20px;border-radius:30px;font-size:14px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}

/* ORG VIEW */
.org-btn{width:100%;padding:16px;border:2px solid var(--border);border-radius:12px;background:var(--card);font-size:15px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.org-btn:active{opacity:0.85;}
.org-btn-icon{font-size:24px;}
.org-btn-text{display:flex;flex-direction:column;gap:2px;}
.org-btn-title{font-weight:500;font-size:15px;}
.org-btn-sub{font-size:12px;color:var(--muted);}
</style>

<script>
const SUPABASE_URL = 'https://fkliyqjxnttzyuzogrng.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_Eu6-MQxkfyaxii2vpCR-IQ_uqS90NRf';

const STORE_COLORS = {'lb':'#22C55E','boerse':'#A855F7','1020':'#3B82F6','1070':'#EAB308','3400':'#F97316','kitchen':'#EF4444','zentrale':'#6B7280'};
const TRANSPORTER_CATS = ['Verpackungen','Alltag','Food & Drinks','Reinigung'];
const KC_CATS = ['Webshop-Produkte'];
const SWEETS_CATS = ['Sweets'];
const CATS = [...TRANSPORTER_CATS, ...KC_CATS, ...SWEETS_CATS];
const WEEKDAY_NAMES = {1:'Montag',2:'Dienstag',3:'Mittwoch',4:'Donnerstag',5:'Freitag'};
const WEEKDAY_STR = {1:'mo',2:'di',3:'mi',4:'do',5:'fr'}; // Mapping zu weekly_menu.weekday (String-Format)

  {code:'R', label:'Weichtiere'}
];
let homeMode='alltag';
const FIXER_LIEFERANT='Michi – Karma Transporter';
function setHomeMode(m){ homeMode=m; renderHome(); }
const KONTROLLE_PUNKTE = [
  {icon:'🥜', titel:'Allergene', oneliner:'Was ist drin? Hier nachschauen.', text:'Die 14 gesetzlich gekennzeichneten Stoffe (z.B. Gluten, Nüsse, Milch, Soja), die bei manchen Gästen heftige bis lebensgefährliche Reaktionen auslösen können. Zu jedem Gericht muss bekannt sein, welche Allergene enthalten sind — schriftlich oder mündlich, aber dann muss wirklich jemand Bescheid wissen, der gerade da ist.', target:'allergene'},

let clDone = {};
let stockData = {};

function goToPackTab(tab){ activePackTab=tab; goTo('pack'); }
let lang = localStorage.getItem('kf_lang') || 'de';
const tCache = {};

// ---- TRANSLATE ----
function toggleLangMenu(){
  const m = document.getElementById('lang-menu');
  m.style.display = m.style.display === 'block' ? 'none' : 'block';
}
document.addEventListener('click', e => {
  if (!e.target.closest('.lang-btn') && !e.target.closest('#lang-menu'))
    document.getElementById('lang-menu').style.display = 'none';
});
async function tx(text) {
  if (lang === 'de' || !text || text.length < 2) return text;
  const key = lang+'::'+text;
  if (tCache[key]) return tCache[key];
  try {
    const r = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=de&tl=${lang}&dt=t&q=${encodeURIComponent(text)}`);
    const d = await r.json();
    tCache[key] = d[0].map(x=>x[0]).join('');
    return tCache[key];
  } catch { return text; }
}
async function translateEl(el) {
  if (lang === 'de' || !el) return;
  const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT);
  const nodes = [];
  let n;
  while(n = walker.nextNode()) {
    // Skip text inside elements marked no-translate (e.g. store names)
    if (n.parentElement && n.parentElement.closest('[data-no-translate]')) continue;
    const t = n.textContent.trim();
    if (t.length > 1 && !/^[\d·✓×+\-\/\.]+$/.test(t)) nodes.push({node:n, orig:t});
  }
  for (const {node, orig} of nodes) {
    node.textContent = node.textContent.replace(orig, await tx(orig));
  }
  for (const inp of el.querySelectorAll('textarea,input[placeholder]')) {
    if (inp.placeholder) inp.placeholder = await tx(inp.placeholder);
  }
}
async function setLang(l) {
  lang = l;
  localStorage.setItem('kf_lang', l);
  document.getElementById('lang-menu').style.display = 'none';
  const v = document.querySelector('.view.show');
  if (v) translateEl(v);
}

// ---- API ----
async function api(path, opts={}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: {'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY,'Content-Type':'application/json','Prefer':'return=representation',...(opts.headers||{})},
    mode:'cors', ...opts
  });
  if (!res.ok) throw new Error(await res.text());
  const t = await res.text();
  return t ? JSON.parse(t) : null;
}

// ---- LOGIN ----
async function initLogin() {
  try {
    const stores = await api('stores?select=id,name&order=id');
    const list = document.getElementById('store-list');
    if (!stores?.length) { list.innerHTML='<p style="color:red;font-size:12px;">Verbindungsfehler</p>'; return; }
    list.innerHTML = stores.map(s => {
      const col = STORE_COLORS[s.id]||'#888';
      return `<button class="store-btn" onclick="pickStore('${s.id}','${s.name.replace(/'/g,"\\'")}')" data-no-translate>
        <span class="store-dot" style="background:${col};"></span>${s.name}
      </button>`;
    }).join('');
    const saved = localStorage.getItem('kf_store');
    if (saved) loginAs(JSON.parse(saved));
  } catch(e) {
    document.getElementById('store-list').innerHTML=`<p style="color:red;font-size:12px;">Fehler: ${e.message}</p>`;
  }
}
function pickStore(id, name) {
  document.getElementById('store-picker').style.display='none';
  document.getElementById('pin-form').style.display='flex';
  document.getElementById('pin-form').style.flexDirection='column';
  document.getElementById('pin-store-name').textContent=name;
  document.getElementById('pin-input').value='';
  document.getElementById('pin-error').style.display='none';
  document.getElementById('pin-input').dataset.storeId=id;

function showStorePicker(){
  document.getElementById('pin-form').style.display='none';

}
async function checkPin(){
  const pin=document.getElementById('pin-input').value;
  const id=document.getElementById('pin-input').dataset.storeId;
  const name=document.getElementById('pin-input').dataset.storeName;
  try {
    const s=await api(`stores?id=eq.${id}&pin=eq.${pin}&select=id,name`);
    if(s?.length) { localStorage.setItem('kf_store',JSON.stringify({id,name})); loginAs({id,name}); }

  } catch { document.getElementById('pin-error').style.display='block'; }
}
document.addEventListener('DOMContentLoaded',()=>{

});
async function loginAs(store){
  currentStore=store;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('tb-sub').textContent=store.name;
  const av=document.getElementById('tb-avatar');
  av.textContent=store.name.slice(0,2).toUpperCase();

}

// ---- DATA ----
async function loadAll(){
  const today=new Date().toISOString().split('T')[0];
  articles=await api('articles?select=*&order=sort_order');
  const tmpl=await api('checklist_templates?select=*&order=sort_order');
  templates={};
  CL_TYPES.forEach(t=>templates[t]=tmpl.filter(x=>x.list_type===t));
  const ord=await api(`orders?store_id=eq.${currentStore.id}&order_date=eq.${today}&select=article_id,quantity`);
  orderQtys={};
  (ord||[]).forEach(o=>orderQtys[o.article_id]=o.quantity);
  const done=await api(`checklist_done?store_id=eq.${currentStore.id}&done_date=eq.${today}&select=template_id`);
  clDone={};
  (done||[]).forEach(d=>clDone[d.template_id]=true);
  const stk=await api('stock?select=article_id,quantity');
  stockData={};
  (stk||[]).forEach(s=>stockData[s.article_id]=s.quantity);
}

// ---- NAV ----
function goTo(v){
  currentView=v;
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('show'));

  document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active'));

  const subs={home:currentStore?.name,order:'Bestellung aufgeben',check:'Checklisten',pack:'Packliste',org:'Organisation',msg:'Nachricht',sweets:'Sweets',kitchen:'Küche',disposal:'Entsorgung',allergene:'Zutaten & Allergene',schulung:'Schulungen',dailycheck:'Daily Check-up',maengel:'Schaden melden',verfuegbarkeit:'Verfügbarkeit verwalten'};
  const subEl=document.getElementById('tb-sub');
  subEl.textContent=subs[v]||'';

    try{
      const [ordersToday, kcSubToday] = await Promise.all([

      const orderedIds=new Set((ordersToday||[]).map(o=>o.article_id));
      const transporterDone=articles.some(a=>TRANSPORTER_CATS.includes(a.category)&&orderedIds.has(a.id));

    ${homeMode==='alltag'?`

      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
        <div class="hc-icon"><svg width="16" height="16" viewBox="0 0 24 24" stroke="var(--green)" stroke-width="2" fill="none"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg></div>
        <span style="font-weight:500;">Daily Check-up</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px;"><span style="font-size:12px;color:var(--muted);">Wareneingangskontrolle</span>${dcStatus.wek?'<span class="badge badge-ok">erledigt</span>':'<span class="badge badge-warn">ausstehend</span>'}</div>

      <div style="display:flex;align-items:center;gap:8px;">
        <div class="hc-icon"><svg width="16" height="16" viewBox="0 0 24 24" stroke="var(--green)" stroke-width="2" fill="none"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg></div>

async function toggleArticleVerfuegbar(id, current){
  let hinweis=null;
  if(current){
    hinweis=prompt('Hinweis für die Stores (optional)\nz.B. "wird erst Donnerstag geliefert"','')||'';
  }
  try{
    await api(`articles?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({verfuegbar:!current, verfuegbar_hinweis: current?hinweis:null})});
    articles=await api('articles?select=*&order=sort_order');
    if(currentView==='verfuegbarkeit') renderVerfuegbarkeit(); else renderOrder();
  }catch(e){console.error(e);showToast('Fehler beim Speichern');}
}

// Wandelt Dezimalzahlen in lesbare Bruch-Darstellung für Küche-Mengen um (1.5 -> 1½, 0.333 -> ⅓, 0.75 -> ¾)
function formatQty(n){
  if(n===null||n===undefined||n==='') return '';
  const num=parseFloat(n);
  if(isNaN(num)) return n;
  const whole=Math.floor(num);
  const frac=Math.round((num-whole)*1000)/1000;
  const fracMap={0:'',0.25:'¼',0.333:'⅓',0.5:'½',0.667:'⅔',0.75:'¾'};
  if(fracMap.hasOwnProperty(frac)){
    const f=fracMap[frac];
    if(whole===0) return f||'0';
    return f ? `${whole}${f}` : `${whole}`;
  }
  // kein bekannter Bruch -> normale Zahl, Punkt durch Komma falls Nachkommastellen
  return num % 1 === 0 ? `${num}` : num.toString().replace('.',',');
}
function getWeekdayDates(){
  // Liefert {1:'YYYY-MM-DD', ..., 5:'YYYY-MM-DD'} für Mo-Fr der AKTUELLEN Kalenderwoche
  const now=new Date();
  const dow=now.getDay(); // 0=So..6=Sa
  const diffToMonday=dow===0?-6:1-dow;
  const monday=new Date(now);
  monday.setDate(now.getDate()+diffToMonday);
  const dates={};
  for(let i=0;i<5;i++){
    const d=new Date(monday);
    d.setDate(monday.getDate()+i);
    dates[i+1]=d.toISOString().split('T')[0];
  }
  return dates;
}

const FORECAST_DISHES=['Curry','Dal','Reis','Biryani','Gulasch','Lasagne']; // Hauptspeisen-Pool, tatsächliche Auswahl kommt aus weekly_menu
async function computeAutoSuggestion(storeId, dishName, weekdayStr){
  // Heuristik: Schnitt der letzten Wochen für diesen Wochentag/Filiale/Gericht aus disposal.
  // leftover_qty hoch -> zu viel produziert; sold_out_time früh -> zu wenig. Ohne produzierte Menge in der DB
  // nutzen wir leftover_qty als Korrektursignal auf den letzten manuellen/vorherigen forecast-Wert.
  const recentForecasts=await api(`forecast_qty?store_id=eq.${storeId}&dish_name=eq.${encodeURIComponent(dishName)}&order=forecast_date.desc&limit=8&select=forecast_date,qty`).catch(()=>[]);
  if(!recentForecasts?.length) return null;
  const oldestDate=recentForecasts[recentForecasts.length-1].forecast_date;
  const newestDate=recentForecasts[0].forecast_date;
  const disp=await api(`disposal?store_id=eq.${storeId}&dish_name=eq.${encodeURIComponent(dishName)}&disposal_date=gte.${oldestDate}&disposal_date=lte.${newestDate}&select=disposal_date,leftover_qty,sold_out_time`).catch(()=>[]);
  const dispMap={}; (disp||[]).forEach(d=>dispMap[d.disposal_date]=d);

  let total=0, count=0;
  recentForecasts.forEach(f=>{
    const d=dispMap[f.forecast_date];
    let adj=f.qty;
    if(d){
      if(d.leftover_qty && d.leftover_qty>0) adj=f.qty - d.leftover_qty*0.5; // viel übrig -> etwas reduzieren
      if(d.sold_out_time) adj=f.qty * 1.1; // früh ausverkauft -> leicht erhöhen
    }
    total+=adj; count++;
  });
  return count ? Math.round((total/count)*4)/4 : null; // auf Viertel runden
}
function isLasagneLocked(dateStr){
  const cutoff=new Date(dateStr+'T12:00:00');
  cutoff.setDate(cutoff.getDate()-1); // Vortag, 12:00 Uhr
  return new Date()>cutoff;
}

  const tabArticleIds=new Set(articles.filter(a=>tab.cats.includes(a.category)).map(a=>a.id));
  const rows=Object.entries(orderQtys)
    .filter(([id,v])=>v>0 && tabArticleIds.has(parseInt(id)))
    .map(([id,qty])=>({store_id:currentStore.id,article_id:parseInt(id),quantity:qty,order_date:today}));
  const note=document.getElementById('special-note-'+activeOrderTab)?.value?.trim()||'';
  if(!rows.length&&!note){showToast('Nichts eingetragen');return;}
  try{
    for(const aid of tabArticleIds){
      await api(`orders?store_id=eq.${currentStore.id}&article_id=eq.${aid}&order_date=eq.${today}`,{method:'DELETE'});
    }
    if(rows.length) await api('orders',{method:'POST',body:JSON.stringify(rows)});
    if(note){
      await api(`special_orders?store_id=eq.${currentStore.id}&order_date=eq.${today}`,{method:'DELETE'});
      await api('special_orders',{method:'POST',body:JSON.stringify([{store_id:currentStore.id,note,order_date:today}])});
    }
    showToast('✓ '+tab.title+' gespeichert!');
    goTo('home');
  }catch(e){console.error(e);showToast('Fehler — bitte nochmal versuchen');}
}

function switchCl(t){activeCl=t;document.querySelectorAll('.cl-tab').forEach((b,i)=>b.classList.toggle('active',CL_TYPES[i]===t));renderClBody();}
function clItemEmoji(text){
  const t=(text||'').toLowerCase();
  if(t.includes('aufsperr')||t.includes('einstempeln')) return '🔑';
  if(t.includes('absperr')||t.includes('abschließen')) return '🔒';
  if(t.includes('warmhalte')) return '🔥';
  if(t.includes('kaffee')) return '☕';
  if(t.includes('alles sauber')||t.includes('sauber?')) return '🧼';
  if(t.includes('reinig')||t.includes('putzen')||t.includes('wischen')) return '🧹';
  if(t.includes('desinfiz')) return '🧴';
  if(t.includes('verpackung')) return '📦';
  if(t.includes('limetten')||t.includes('schneiden')||t.includes('einräumen')) return '🥗';
  if(t.includes('tafel')||t.includes('beschriften')) return '✏️';
  if(t.includes('musik')) return '🎵';
  if(t.includes('geschirrspüler')) return '🍽️';
  if(t.includes('einsortieren')) return '📥';
  if(t.includes('bestellt')) return '✅';
  if(t.includes('whatsapp')) return '💬';
  if(t.includes('kassa')||t.includes('kasse')) return '💶';
  if(t.includes('müll')||t.includes('mistkübel')||t.includes('mist')) return '🗑️';
  if(t.includes('licht')) return '💡';
  if(t.includes('kühl')) return '❄️';
  if(t.includes('boden')) return '🧺';
  return '📝';
}
const CL_SECTION_EMOJI={oeffnung:'🔑',reinigung:'🧹',abschluss:'🌙'};
function renderClBody(){
  const items=templates[activeCl]||[];
  const done=items.filter(x=>clDone[x.id]).length;
  const secs=[...new Set(items.map(x=>x.section))];
  const el=document.getElementById('cl-body');
  let html=`<div class="progress-row"><span>Fortschritt</span><span>${done} / ${items.length}</span></div>
    <div class="progress-bar"><div class="progress-fill" style="width:${items.length?Math.round(done/items.length*100):0}%"></div></div>
    <div class="card">`;
  secs.forEach(sec=>{
    html+=`<div class="section-lbl" style="padding:8px 14px 4px;">${CL_SECTION_EMOJI[activeCl]||'📋'} ${sec}</div>`;
    items.filter(x=>x.section===sec).forEach(item=>{
      const d=!!clDone[item.id];
      html+=`<div class="cl-item" onclick="toggleCl(${item.id})">
        <div class="check-box${d?' done':''}">
          ${d?`<svg width="12" height="12" viewBox="0 0 24 24" stroke="#fff" stroke-width="3" fill="none"><polyline points="20 6 9 17 4 12"/></svg>`:''}
        </div>
        <span class="cl-text${d?' done':''}">${clItemEmoji(item.item_text)} ${item.item_text}</span>
      </div>`;
    });
  });
  html+='</div>';
  el.innerHTML=html;
  translateEl(el);
}
async function toggleCl(templateId){
  const today=new Date().toISOString().split('T')[0];
  if(clDone[templateId]){
    await api(`checklist_done?store_id=eq.${currentStore.id}&template_id=eq.${templateId}&done_date=eq.${today}`,{method:'DELETE'});
    delete clDone[templateId];
  }else{
    await api('checklist_done',{method:'POST',body:JSON.stringify({store_id:currentStore.id,template_id:templateId,done_date:today})});
    clDone[templateId]=true;
  }
  renderClBody();
  const items=templates[activeCl]||[];
  if(items.length&&items.filter(x=>clDone[x.id]).length===items.length) showToast('✓ '+CL_LABELS[activeCl]+' erledigt!');
}

async function buildSchulungMatrixHtml(){
  const [themen, stores, entries] = await Promise.all([
    api('schulungsthemen?select=*&order=titel.asc').catch(()=>[]),
    api('stores?select=id,name&order=id').catch(()=>[]),
    api('schulungen?select=*').catch(()=>[])
  ]);
  const storeList=(stores||[]).filter(s=>s.id!=='zentrale');
  if(!themen?.length || !storeList.length) return '<div style="font-size:13px;color:var(--muted);padding:8px 2px;">Noch keine Themen oder Filialen vorhanden.</div>';
  const latest={};
  (entries||[]).forEach(e=>{
    const key=e.thema_id+'|'+e.store_id;
    if(!latest[key] || new Date(e.datum)>new Date(latest[key])) latest[key]=e.datum;
  });
  let html=`<div class="card"><div style="overflow-x:auto;"><table class="pack-table"><thead><tr><th style="text-align:left;">Thema</th>${storeList.map(s=>`<th data-no-translate>${s.name}</th>`).join('')}</tr></thead><tbody>`;
  themen.forEach(t=>{
    html+=`<tr><td>${t.titel}</td>`;
    storeList.forEach(s=>{
      const d=latest[t.id+'|'+s.id];
      let cell;
      if(!d){
        cell='<span class="badge badge-warn">nie</span>';
      }else{
        const cutoff=new Date(); cutoff.setMonth(cutoff.getMonth()-t.intervall_monate);
        const dd=new Date(d).toLocaleDateString('de-AT',{day:'2-digit',month:'2-digit'});
        cell=(new Date(d)>=cutoff)?`<span class="badge badge-ok">${dd}</span>`:`<span class="badge badge-warn">${dd}</span>`;
      }
      html+=`<td>${cell}</td>`;
    });
    html+='</tr>';
  });
  html+='</tbody></table></div></div>';
  return html;
}

async function saveSchulungThema(){
  const titel=document.getElementById('sch-titel').value.trim();
  const erklaerung=document.getElementById('sch-erklaerung').value.trim();
  const intervall=parseInt(document.getElementById('sch-intervall').value)||12;

async function deleteSchulungThema(id){

async function fillSchulungDropdowns(){
  const themen=await api('schulungsthemen?select=id,titel&order=titel.asc').catch(()=>[]);
  const stores=await api('stores?select=id,name&order=id').catch(()=>[]);

async function saveSchulungEntry(){
  const thema_id=document.getElementById('sch-thema-select').value;
  const store_id=document.getElementById('sch-store-select').value;
  const datum=document.getElementById('sch-datum').value;
  const durchgefuehrt_von=document.getElementById('sch-durchgefuehrt').value.trim();
  const teilnehmer=document.getElementById('sch-teilnehmer').value.trim();
  if(!thema_id||!store_id||!datum){ alert('Bitte Thema, Filiale und Datum ausfüllen.'); return; }
  try{
    await api('schulungen',{method:'POST',body:JSON.stringify([{thema_id:parseInt(thema_id),store_id,datum,durchgefuehrt_von,teilnehmer}])});
  }catch(e){ console.error(e); alert('Fehler beim Speichern.'); return; }
  document.getElementById('sch-durchgefuehrt').value='';
  document.getElementById('sch-teilnehmer').value='';
  refreshSchulungHistorie();
}

async function refreshSchulungHistorie(){
  const [entries, themen, stores] = await Promise.all([
    api('schulungen?select=*&order=datum.desc&limit=30').catch(()=>[]),
    api('schulungsthemen?select=id,titel').catch(()=>[]),
    api('stores?select=id,name').catch(()=>[])
  ]);
  const wrap=document.getElementById('schulungHistorieAdmin');
  if(!wrap) return;
  const themaMap=Object.fromEntries((themen||[]).map(t=>[t.id,t.titel]));
  const storeMap=Object.fromEntries((stores||[]).map(s=>[s.id,s.name]));
  wrap.innerHTML=(entries||[]).map(e=>`
    <div class="card" style="padding:12px;">
      <div style="display:flex;justify-content:space-between;align-items:baseline;">
        <strong>${themaMap[e.thema_id]||'—'}</strong>
        <span style="font-size:11px;color:var(--muted);">${new Date(e.datum).toLocaleDateString('de-AT')}</span>
      </div>
      <div style="font-size:12px;color:var(--sub);margin-top:4px;" data-no-translate>${storeMap[e.store_id]||e.store_id}${e.durchgefuehrt_von?' · von '+e.durchgefuehrt_von:''}</div>
      ${e.teilnehmer?`<div style="font-size:12px;color:var(--muted);margin-top:2px;">Teilnehmer: ${e.teilnehmer}</div>`:''}
      <div style="margin-top:8px;"><button onclick="deleteSchulungEntry(${e.id})" style="background:none;border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:12px;color:#DC2626;cursor:pointer;">Löschen</button></div>
    </div>
  `).join('') || '<div style="font-size:13px;color:var(--muted);padding:8px 2px;">Noch keine Schulungen eingetragen.</div>';

async function deleteSchulungEntry(id){
  if(!confirm('Eintrag wirklich löschen?')) return;
  try{ await api(`schulungen?id=eq.${id}`,{method:'DELETE'}); }catch(e){ console.error(e); return; }
  refreshSchulungHistorie();
}

async function loadSchulungStatusStore(){
  const [themen, entries] = await Promise.all([
    api('schulungsthemen?select=*&order=titel.asc').catch(()=>[]),
    api(`schulungen?select=*&store_id=eq.${currentStore.id}&order=datum.desc`).catch(()=>[])
  ]);
  const wrap=document.getElementById('schulungStatusStore');
  if(!wrap) return;
  wrap.innerHTML=(themen||[]).map(t=>{
    const last=(entries||[]).find(e=>e.thema_id===t.id);
    let pillHtml;
    if(!last){
      pillHtml='<span class="badge badge-warn">noch nie geschult</span>';
    } else {
      const lastDate=new Date(last.datum);
      const cutoff=new Date(); cutoff.setMonth(cutoff.getMonth()-t.intervall_monate);
      pillHtml=(lastDate>=cutoff)?'<span class="badge badge-ok">aktuell</span>':'<span class="badge badge-warn">überfällig</span>';
    }
    return `
      <div class="card" style="padding:12px;">
        <div style="display:flex;justify-content:space-between;align-items:baseline;">
          <strong>${t.titel}</strong>
          ${pillHtml}
        </div>
        ${last?`<div style="font-size:11px;color:var(--muted);margin-top:4px;">zuletzt: ${new Date(last.datum).toLocaleDateString('de-AT')}</div>`:''}
        ${t.erklaerung?`<div style="font-size:12px;color:var(--sub);margin-top:6px;">${t.erklaerung}</div>`:''}
      </div>
    `;
  }).join('') || '<div style="font-size:13px;color:var(--muted);padding:8px 2px;">Noch keine Schulungsthemen angelegt.</div>';
}

function toggleWareOkUI(){
  const box=document.getElementById('wek-ware-ok-box');

  box.classList.toggle('done', next);
  box.innerHTML=next?'<svg width="12" height="12" viewBox="0 0 24 24" stroke="#fff" stroke-width="3" fill="none"><polyline points="20 6 9 17 4 12"/></svg>':'';
}

function checkWareneingangTemp(){
  const v=parseFloat(document.getElementById('wek-temp').value);
  const wrap=document.getElementById('wek-massnahme-wrap');
  if(wrap) wrap.style.display=(!isNaN(v)&&v<65)?'block':'none';
}

async function saveWareneingang(){
  const temp=parseFloat(document.getElementById('wek-temp').value);
  if(isNaN(temp)){ showToast('Bitte Temperatur eingeben'); return; }
  const massnahmeEl=document.getElementById('wek-massnahme');
  const massnahme=massnahmeEl?massnahmeEl.value.trim():'';
  if(temp<65 && !massnahme){ showToast('Bitte Maßnahme bei Abweichung angeben'); return; }
  const lieferant=FIXER_LIEFERANT;
  const ware=document.getElementById('wek-ware').value.trim();
  const wareOk=document.getElementById('wek-ware-ok-box').dataset.value==='1';
  const today=new Date().toISOString().split('T')[0];
  try{
    await api(`wareneingang?store_id=eq.${currentStore.id}&datum=eq.${today}`,{method:'DELETE'});
    await api('wareneingang',{method:'POST',body:JSON.stringify([{store_id:currentStore.id,datum:today,lieferant:lieferant||null,ware:ware||null,ware_ok:wareOk,temperatur:temp,massnahme:massnahme||null,mitarbeiter:currentStore.name}])});
    showToast('✔ Gespeichert');
  }catch(e){console.error(e);showToast('Fehler beim Speichern');}
}

async function toggleReinigungField(field){
  const today=new Date().toISOString().split('T')[0];
  const cur=(await api(`reinigungsprotokoll?store_id=eq.${currentStore.id}&datum=eq.${today}&select=reinigung_erledigt,desinfektion_erledigt`).catch(()=>[]))[0]||{};
  const updated={reinigung_erledigt:!!cur.reinigung_erledigt, desinfektion_erledigt:!!cur.desinfektion_erledigt};
  updated[field]=!updated[field];
  try{
    await api(`reinigungsprotokoll?store_id=eq.${currentStore.id}&datum=eq.${today}`,{method:'DELETE'});
    await api('reinigungsprotokoll',{method:'POST',body:JSON.stringify([{store_id:currentStore.id,datum:today,...updated,mitarbeiter:currentStore.name}])});
    showToast('✔ Gespeichert');
    renderDailyCheck();
  }catch(e){console.error(e);showToast('Fehler beim Speichern');}
}

async function saveKuehleinrichtungen(){

}

async function sendMangelMeldung(){
  const text=document.getElementById('mangel-text')?.value?.trim();
  if(!text){ showToast('Bitte Beschreibung eingeben'); return; }
  const now=new Date().toLocaleString('de-AT',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  try{
    await api('maengel',{method:'POST',body:JSON.stringify([{store_id:currentStore.id,beschreibung:text,gemeldet_von:currentStore.name,status:'offen'}])});
    await emailjs.send('service_xla195w','template_9uiq1wf',{
      name: currentStore.name+' — Schadensmeldung',
      time: now,
      message: text,
      title: 'Karma Food Schadensmeldung',
      to_email: 'tini@karmafood.at'
    });
    showToast('✓ Gemeldet & E-Mail verschickt!');
    document.getElementById('mangel-text').value='';
  }catch(e){console.error(e);showToast('Fehler — bitte nochmal versuchen');}

const WEEKDAYS=[{k:'mo',l:'Montag'},{k:'di',l:'Dienstag'},{k:'mi',l:'Mittwoch'},{k:'do',l:'Donnerstag'},{k:'fr',l:'Freitag'}];
const MENU_SLOTS=[{k:'salat',l:'Salat'},{k:'gericht1',l:'Gericht 1'},{k:'gericht2',l:'Gericht 2'},{k:'gericht3',l:'Gericht 3'},{k:'reis',l:'Reis'}];
let kitchenTab='plan';
let weekOffset=0; // 0 = aktuelle Woche, -1 = letzte Woche, etc.
function getWeekDates(offset){
  const now=new Date();
  const monday=new Date(now);
  const dayNum=(now.getDay()+6)%7;
  monday.setDate(now.getDate()-dayNum+offset*7);
  const days=[];
  for(let i=0;i<5;i++){
    const d=new Date(monday);
    d.setDate(monday.getDate()+i);
    days.push(d);
  }
  return days;
}
function isoDate(d){return d.toISOString().split('T')[0];}

      });
      html+='</div>';
    });
  }else if(kitchenTab==='disposal'){

    const storeList=stores.filter(s=>s.id!=='zentrale' && s.id!=='kitchen');
    const today=new Date().toISOString().split('T')[0];
    const todayWeekday=new Date().getDay();
    const wdStr=WEEKDAY_STR[todayWeekday];
    const menu=await api('weekly_menu?select=weekday,slot,dish_name').catch(()=>[]);
    const dayMenu=menu.filter(m=>m.weekday===wdStr && m.slot!=='salat');
    const dishNames=[...new Set(dayMenu.map(m=>m.dish_name).filter(n=>n && n!=='Reis'))];
    const reisEntry=dayMenu.find(m=>m.slot==='reis');
    const allDishes=['Salat', ...dishNames, ...(reisEntry?[reisEntry.dish_name]:[])].filter(Boolean);
    const forecastToday=await api(`forecast_qty?forecast_date=eq.${today}&select=store_id,dish_name,qty,source`).catch(()=>[]);
    const fMap={};
    (forecastToday||[]).forEach(f=>{ if(!fMap[f.store_id])fMap[f.store_id]={}; fMap[f.store_id][f.dish_name]=f; });

    html+=`<div style="font-size:12px;color:var(--muted);margin:10px 0;">${new Date().toLocaleDateString('de-AT',{weekday:'long',day:'2-digit',month:'2-digit'})} — geplante Menge in Behältern, die heute an die Filialen geschickt wird</div>`;
    if(!wdStr){
      html+=`<div style="padding:1.5rem;text-align:center;color:var(--muted);font-size:13px;">Am Wochenende gibt es keinen Speiseplan.</div>`;
    }else{
      html+=`<div class="card"><div style="overflow-x:auto;"><table class="pack-table"><thead><tr>

        ${allDishes.map(d=>`<th data-no-translate style="font-size:11px;">${d}</th>`).join('')}
      </tr></thead><tbody>`;
      storeList.forEach(st=>{
        const cells=allDishes.map(dish=>{
          const rec=(fMap[st.id]||{})[dish];
          if(!rec) return '<td style="color:var(--border);">·</td>';

      html+='</tbody></table></div></div>';
      html+=`<div style="font-size:10px;color:var(--muted);padding:2px 4px 8px;">* von Filiale angepasst</div>`;
    }
  }else if(kitchenTab==='supply'){
    // BEILAGEN — Soll-Mengen aller Filialen für die ganze Woche, mit Gesamtsumme pro Artikel/Tag
    const stores=await api('stores?select=id,name&order=id');
    const storeList=stores.filter(s=>s.id!=='zentrale' && s.id!=='kitchen');
    const todayWeekday=new Date().getDay();
    const weekDates=getWeekdayDates();
    const fromDate=weekDates[1], toDate=weekDates[5];

    html+=`<div style="font-size:12px;color:var(--muted);margin:10px 0;">Mengen pro Filiale & Gesamtsumme für die Küchen-Produktion</div>`;

    const baseline=await api(`kitchen_supply_baseline?select=store_id,weekday,article_name,unit,base_qty`).catch(()=>[]);
    const weekVals=await api(`kitchen_supply_today?supply_date=gte.${fromDate}&supply_date=lte.${toDate}&select=store_id,supply_date,article_name,qty,is_adjusted`).catch(()=>[]);
    const valMap={}; // valMap[date][store_id][article_name] = rec
    (weekVals||[]).forEach(d=>{
      if(!valMap[d.supply_date])valMap[d.supply_date]={};
      if(!valMap[d.supply_date][d.store_id])valMap[d.supply_date][d.store_id]={};
      valMap[d.supply_date][d.store_id][d.article_name]=d;
    });
    const anyAdjusted=(weekVals||[]).some(d=>d.is_adjusted);

    if(anyAdjusted){
      html+=`<div style="background:#FFF7ED;border:1px solid #FDBA74;border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:12px;color:#C2410C;display:flex;align-items:center;gap:6px;">
        <span>⚠️</span><span>Mindestens eine Filiale hat diese Woche eine Menge angepasst</span>
      </div>`;
    }

    if(!baseline?.length){
      html+=`<div class="card" style="padding:14px;text-align:center;color:var(--muted);font-size:12px;">Keine Grundmengen hinterlegt.</div>`;
    }else{
      for(let wd=1; wd<=5; wd++){
        const dayItems=baseline.filter(b=>b.weekday===wd);
        if(!dayItems.length) continue;
        const isToday=wd===todayWeekday;
        const dateStr=weekDates[wd];
        const dateLabel=new Date(dateStr+'T00:00:00').toLocaleDateString('de-AT',{day:'2-digit',month:'2-digit'});
        const articleNames=[...new Set(dayItems.map(b=>b.article_name))];

        html+=`<div class="section-lbl" style="${isToday?'color:#3B6D11;font-weight:700;':''}">${WEEKDAY_NAMES[wd]} · ${dateLabel}${isToday?' — heute':''}</div>`;
        html+=`<div class="card" style="${isToday?'border:1.5px solid #3B6D11;':''}"><div style="overflow-x:auto;"><table class="pack-table"><thead><tr>
          <th style="text-align:left;">Artikel</th>
          ${storeList.map(st=>`<th style="color:${STORE_COLORS[st.id]||'#888'};font-size:11px;" data-no-translate>${st.name.split(' ')[0]}</th>`).join('')}
          <th style="font-weight:700;">Gesamt</th>
        </tr></thead><tbody>`;

        const ARTICLE_COLORS={'Bowl Sauce':'#1D4ED8','Limetten':'#15803D','Dressing':'#B91C1C','Petersilie':'#DB6B57','Salat':'#A21CAF','Raita':'#15803D'};

        articleNames.forEach(name=>{
          const unit=dayItems.find(b=>b.article_name===name)?.unit||'';
          let sum=0;
          let anyAdjustedRow=false;
          const cells=storeList.map(st=>{
            const b=dayItems.find(x=>x.store_id===st.id && x.article_name===name);
            if(!b) return '<td style="color:var(--border);">·</td>';
            const rec=(valMap[dateStr]?.[st.id]||{})[name];
            const val=rec?rec.qty:b.base_qty;
            sum+=parseFloat(val)||0;
            const adjusted=rec?.is_adjusted;
            if(adjusted) anyAdjustedRow=true;
            return `<td style="font-weight:${adjusted?'700':'400'};color:${adjusted?'#C2410C':'#1a1a18'};font-size:12px;">${formatQty(val)}${adjusted?'*':''}</td>`;
          }).join('');
          const sumDisplay = Number.isInteger(sum) ? sum : Math.round(sum*1000)/1000;
          html+=`<tr>
            <td data-no-translate style="font-size:12px;font-weight:600;color:${ARTICLE_COLORS[name]||'#444'};">${name}<div style="font-size:9px;font-weight:400;color:var(--muted);">${unit}</div></td>
            ${cells}
            <td style="font-weight:700;color:#3B6D11;font-size:12px;">${formatQty(sumDisplay)}</td>
          </tr>`;
        });
        html+='</tbody></table></div></div>';
        const hasAnyAdjusted=articleNames.some(name=>storeList.some(st=>(valMap[dateStr]?.[st.id]||{})[name]?.is_adjusted));
        if(hasAnyAdjusted){
          html+=`<div style="font-size:10px;color:#C2410C;padding:2px 4px 8px;">* von Filiale angepasst</div>`;
        }
      }
    }
  }else if(kitchenTab==='forecast'){
    // FORECAST — Portionsmengen aller Filialen für die ganze Woche, wie das Excel-Vorbild
    const stores=await api('stores?select=id,name&order=id');
    const storeList=stores.filter(s=>s.id!=='zentrale' && s.id!=='kitchen');
    const todayWeekday=new Date().getDay();
    const weekDates=getWeekdayDates();
    const fromDate=weekDates[1], toDate=weekDates[5];

    html+=`<div style="font-size:12px;color:var(--muted);margin:10px 0;">Portionsmengen pro Filiale für die Küchen-Produktion</div>`;

    const menu=await api('weekly_menu?select=weekday,slot,dish_name').catch(()=>[]);
    const weekForecasts=await api(`forecast_qty?forecast_date=gte.${fromDate}&forecast_date=lte.${toDate}&select=store_id,forecast_date,dish_name,qty,source`).catch(()=>[]);
    const fMap={}; // fMap[date][store_id][dish] = rec
    (weekForecasts||[]).forEach(f=>{
      if(!fMap[f.forecast_date])fMap[f.forecast_date]={};
      if(!fMap[f.forecast_date][f.store_id])fMap[f.forecast_date][f.store_id]={};
      fMap[f.forecast_date][f.store_id][f.dish_name]=f;
    });
    const anyAdjusted=(weekForecasts||[]).some(f=>f.source==='manual');

    if(anyAdjusted){
      html+=`<div style="background:#F0F9FF;border:1px solid #7DD3FC;border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:12px;color:#0369A1;display:flex;align-items:center;gap:6px;">
        <span>ℹ️</span><span>Mindestens eine Filiale hat diese Woche eine Menge angepasst</span>
      </div>`;
    }

    for(let wd=1; wd<=5; wd++){
      const wdStr=WEEKDAY_STR[wd];
      const dayMenu=menu.filter(m=>m.weekday===wdStr && m.slot!=='salat');
      const dishNames=[...new Set(dayMenu.map(m=>m.dish_name).filter(n=>n && n!=='Reis'))];
      const reisEntry=dayMenu.find(m=>m.slot==='reis');
      const hasLasagne=dayMenu.some(m=>m.dish_name==='Lasagne');
      const allDishes=['Salat', ...dishNames, ...(reisEntry?[reisEntry.dish_name]:[])].filter(Boolean);
      const isToday=wd===todayWeekday;
      const dateStr=weekDates[wd];
      const dateLabel=new Date(dateStr+'T00:00:00').toLocaleDateString('de-AT',{day:'2-digit',month:'2-digit'});

      html+=`<div class="section-lbl" style="${isToday?'color:#0EA5E9;font-weight:700;':''}">${WEEKDAY_NAMES[wd]} · ${dateLabel}${isToday?' — heute':''}${hasLasagne?' · 🥗 grüner Salat automatisch':''}</div>`;
      html+=`<div class="card" style="${isToday?'border:1.5px solid #0EA5E9;':''}"><div style="overflow-x:auto;"><table class="pack-table"><thead><tr>
        <th style="text-align:left;">Filiale</th>
        ${allDishes.map(d=>`<th data-no-translate style="font-size:11px;">${d}</th>`).join('')}
      </tr></thead><tbody>`;

      storeList.forEach(st=>{
        const cells=allDishes.map(dish=>{
          const rec=(fMap[dateStr]?.[st.id]||{})[dish];
          if(!rec) return '<td style="color:var(--border);">·</td>';
          const manual=rec.source==='manual';
          return `<td style="font-weight:${manual?'700':'400'};color:${manual?'#0369A1':'#1a1a18'};font-size:12px;">${formatQty(rec.qty)}${manual?'*':''}</td>`;
        }).join('');
        html+=`<tr>
          <td data-no-translate style="color:${STORE_COLORS[st.id]||'#888'};font-size:12px;">${st.name.split(' ')[0]}</td>
          ${cells}
        </tr>`;
      });
      html+='</tbody></table></div></div>';
      const hasAnyAdjusted=storeList.some(st=>allDishes.some(dish=>(fMap[dateStr]?.[st.id]||{})[dish]?.source==='manual'));
      if(hasAnyAdjusted){
        html+=`<div style="font-size:10px;color:#0369A1;padding:2px 4px 8px;">* von Filiale angepasst</div>`;
      }
    }
  }else{
    // WOCHENÜBERSICHT — historischer Verlauf wie im Excel, eine Woche pro Bildschirm
    const stores=await api('stores?select=id,name&order=id');
    const storeList=stores.filter(s=>s.id!=='zentrale');
    const weekDates=getWeekDates(weekOffset);
    const fromDate=isoDate(weekDates[0]);
    const toDate=isoDate(weekDates[4]);
    const kw=weekDates[0].toLocaleDateString('de-AT',{day:'2-digit',month:'2-digit'})+' – '+weekDates[4].toLocaleDateString('de-AT',{day:'2-digit',month:'2-digit'});

    const disp=await api(`disposal?disposal_date=gte.${fromDate}&disposal_date=lte.${toDate}&select=store_id,disposal_date,slot,dish_name,sold_out_time,leftover_qty`).catch(()=>[]);
    const dispMap={}; // dispMap[date][slot][store_id] = rec
    (disp||[]).forEach(d=>{
      if(!dispMap[d.disposal_date])dispMap[d.disposal_date]={};
      if(!dispMap[d.disposal_date][d.slot])dispMap[d.disposal_date][d.slot]={};
      dispMap[d.disposal_date][d.slot][d.store_id]=d;
    });

    html+=`<div style="display:flex;align-items:center;justify-content:space-between;margin:12px 0;">
      <button onclick="changeWeek(-1)" style="padding:8px 14px;border:1px solid var(--border);border-radius:8px;background:#fff;font-size:13px;cursor:pointer;">← Vorherige</button>
      <div style="font-size:13px;font-weight:600;">${kw}</div>
      <button onclick="changeWeek(1)" style="padding:8px 14px;border:1px solid var(--border);border-radius:8px;background:#fff;font-size:13px;cursor:pointer;" ${weekOffset>=0?'disabled':''}>Nächste →</button>
    </div>`;

    weekDates.forEach((d,i)=>{
      const dateStr=isoDate(d);
      const weekdayKey=WEEKDAYS[i].k;
      const dayData=dispMap[dateStr]||{};
      const hasAny=Object.keys(dayData).length>0;
      html+=`<div class="section-lbl">${WEEKDAYS[i].l} · ${d.toLocaleDateString('de-AT',{day:'2-digit',month:'2-digit'})}</div>`;
      if(!hasAny){
        html+=`<div class="card" style="padding:14px;text-align:center;color:var(--muted);font-size:12px;">Keine Einträge</div>`;
      }else{
        html+=`<div class="card"><div style="overflow-x:auto;"><table class="pack-table"><thead><tr><th style="text-align:left;">Gericht</th>`;
        storeList.forEach(s=>html+=`<th style="color:${STORE_COLORS[s.id]||'#888'};" data-no-translate>${s.name.split(' ')[0]}</th>`);
        html+='</tr></thead><tbody>';
        MENU_SLOTS.forEach(s=>{
          const slotData=dayData[s.k];
          if(!slotData) return;
          const sampleName=Object.values(slotData)[0]?.dish_name || s.l;
          html+=`<tr><td data-no-translate style="font-size:12px;">${sampleName}</td>`;
          storeList.forEach(st=>{
            const rec=slotData[st.id];
            if(!rec){html+='<td style="color:var(--border);">·</td>';return;}
            const time=rec.sold_out_time?rec.sold_out_time.slice(0,5):'';
            const qty=rec.leftover_qty??'';
            html+=`<td style="font-size:11px;line-height:1.5;">${qty!==''?`<div style="font-weight:600;">${qty}</div>`:''}${time?`<div style="color:var(--muted);">${time}</div>`:''}${qty===''&&!time?'·':''}</td>`;
          });
          html+='</tr>';
        });
        html+='</tbody></table></div></div>';
      }
    });
  }
  el.innerHTML=html;
  translateEl(el);
}
function switchKitchenTab(t){kitchenTab=t;if(t==='history')weekOffset=0;renderKitchen();}
function changeWeek(d){weekOffset+=d;if(weekOffset>0)weekOffset=0;renderKitchen();}
window.changeWeek=changeWeek;
async function updateMenu(weekday,slot,dishName){
  try{
    await api(`weekly_menu?weekday=eq.${weekday}&slot=eq.${slot}`,{method:'DELETE'});
    await api('weekly_menu',{method:'POST',body:JSON.stringify([{weekday,slot,dish_name:dishName}])});
    showToast('✓ Gespeichert');
  }catch(e){console.error(e);showToast('Fehler beim Speichern');}
}
window.switchKitchenTab=switchKitchenTab;
window.updateMenu=updateMenu;

// ---- SWEETS LISTE KÜCHE ----
async function renderSweets(){
  const stores=await api('stores?select=id,name&order=id');
  const today=new Date().toISOString().split('T')[0];
  const allOrdRaw=await api(`orders?order_date=eq.${today}&select=store_id,article_id,quantity`);
  const allOrd={};
  allOrdRaw.forEach(o=>{if(!allOrd[o.article_id])allOrd[o.article_id]={};allOrd[o.article_id][o.store_id]=o.quantity;});
  const storeList=stores.filter(s=>s.id!=='zentrale');
  const sweetsItems=articles.filter(a=>a.category==='Sweets');
  const todayStr=new Date().toLocaleDateString('de-AT');

  const el=document.getElementById('v-sweets');
  let html=`<div style="font-size:12px;color:var(--muted);margin-bottom:10px;">Für morgen · Stand: ${todayStr}</div>`;
  html+=`<div class="card"><div style="overflow-x:auto;"><table class="pack-table">
    <thead><tr>
      <th style="text-align:left;">Sweets 🍰</th>`;
  storeList.forEach(s=>{
    const col=STORE_COLORS[s.id]||'#888';
    const hasOrder=sweetsItems.some(a=>(allOrd[a.id]||{})[s.id]>0);
    html+=`<th style="color:${col};" data-no-translate>${s.name.split(' ')[0]}${hasOrder?' ✓':''}</th>`;
  });
  html+=`</tr></thead><tbody>`;
  sweetsItems.forEach(a=>{
    html+=`<tr><td style="font-size:12px;"><div style="display:flex;align-items:center;gap:6px;">${a.image_url?`<img src="${a.image_url}" alt="" style="width:24px;height:24px;border-radius:5px;object-fit:cover;flex-shrink:0;">`:''}<span>${a.name}</span></div></td>`;
    storeList.forEach(s=>{
      const v=(allOrd[a.id]||{})[s.id]||0;
      const hasOrder=sweetsItems.some(x=>(allOrd[x.id]||{})[s.id]>0);
      html+=`<td style="font-weight:${v?'600':'400'};color:${v?'#1a1a18':'var(--border)'};background:${hasOrder?'#F0FDF4':'transparent'};">${v||'·'}</td>`;
    });
    html+=`</tr>`;
  });
  html+='</tbody></table></div></div>';

  html+=`<div class="section-lbl">Bestellstatus</div><div class="card">`;
  storeList.forEach(s=>{
    const hasOrder=sweetsItems.some(a=>(allOrd[a.id]||{})[s.id]>0);
    const col=STORE_COLORS[s.id]||'#888';
    html+=`<div style="display:flex;align-items:center;padding:9px 14px;border-bottom:1px solid var(--border);gap:10px;">
      <span style="width:12px;height:12px;border-radius:50%;background:${col};flex-shrink:0;"></span>
      <span style="flex:1;font-size:13px;" data-no-translate>${s.name}</span>
      <span class="badge ${hasOrder?'badge-ok':'badge-warn'}">${hasOrder?'✓ aktualisiert heute':'noch ausstehend'}</span>
    </div>`;
  });
  html+='</div>';

  el.innerHTML=html;
  translateEl(el);
}

// ---- KC LAGER (IST/SOLL/Bestellung — echtes System wie Google Sheets) ----
let kcLagerStoreId = null;
const KC_KITCHEN_ITEMS=[{p:'Masalas',v:'Masala Gläser',n:'960',e:'4 Karton á 240'},{p:'',v:'Deckel (Masala)',n:'930',e:'2 Karton á 930'},{p:'Toppings/Saucen',v:'Toppings/Saucen Gläser',n:'720',e:'4 Karton á 180'},{p:'Chai',v:'Flasche Braun',n:'120',e:'1 Karton á 120 Stk'},{p:'',v:'Schraubverschluss grau',n:'150',e:'3 Karton á 50 Stk'},{p:'Masala Trio Karton',v:'Einlage (innen)',n:'20',e:'1 Karton á 20 Stk'},{p:'',v:'Box',n:'20',e:'1 Karton á 20 Stk'},{p:'Catering Gläser',v:'Gläser',n:'0',e:''},{p:'',v:'Catering Deckel',n:'0',e:''},{p:'Ghee',v:'Ghee Gläser',n:'0',e:'genug'}];
let kcTab='shop';

async function renderKCLager(){
  const el=document.getElementById('v-kclager');
  const stores=await api('stores?select=id,name&order=id');
  const storeList=stores.filter(s=>s.id!=='zentrale');
  if(!kcLagerStoreId) kcLagerStoreId=storeList[0]?.id;

  let html=`<div class="cl-tabs"><button class="cl-tab${kcTab==='shop'?' active':''}" onclick="switchKCTab('shop')">Lager Shop</button><button class="cl-tab${kcTab==='kitchen'?' active':''}" onclick="switchKCTab('kitchen')">Lager Küche</button></div>`;

  if(kcTab==='shop'){
    // Store selector pills
    html+=`<div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:10px;">`;
    storeList.forEach(s=>{
      const col=STORE_COLORS[s.id]||'#888';
      const active=s.id===kcLagerStoreId;
      html+=`<button onclick="switchKCStore('${s.id}')" data-no-translate style="flex-shrink:0;padding:7px 14px;border:1.5px solid ${active?col:'var(--border)'};border-radius:20px;background:${active?col+'15':'#fff'};color:${active?col:'#1a1a18'};font-size:12px;font-weight:${active?'600':'400'};cursor:pointer;">${s.name.split(' ')[0]}</button>`;
    });
    html+=`</div>`;

    const kcItems=articles.filter(a=>a.category==='Webshop-Produkte');
    const today=new Date().toISOString().split('T')[0];
    const istData=await api(`kc_stock?store_id=eq.${kcLagerStoreId}&select=article_id,ist_bestand,updated_date`).catch(()=>[]);
    const istMap={};
    (istData||[]).forEach(d=>istMap[d.article_id]=d);

    html+=`<div class="card"><div style="overflow-x:auto;"><table class="pack-table">
      <thead><tr><th style="text-align:left;">Artikel</th><th>IST BEST</th><th>SOLL</th><th>Bestellung</th></tr></thead><tbody>`;
    kcItems.forEach(a=>{
      const rec=istMap[a.id];
      const ist=rec?.ist_bestand ?? '';
      const soll=a.min_stock||0;
      const bestellung=(ist!=='' && ist!==null) ? (soll - ist) : null;
      const updatedToday=rec?.updated_date===today;
      html+=`<tr>
        <td style="font-size:12px;">${a.name}</td>
        <td><input type="number" value="${ist}" data-article="${a.id}" onchange="updateIstBestand(${a.id}, this.value)" style="width:50px;text-align:center;border:1.5px solid ${updatedToday?'#22C55E':'var(--border)'};border-radius:5px;font-size:12px;padding:4px;background:${updatedToday?'#F0FDF4':'#fff'};"></td>
        <td style="color:var(--muted);">${soll}</td>
        <td style="font-weight:600;color:${bestellung===null?'var(--muted)':bestellung<0?'#A32D2D':bestellung>0?'#3B6D11':'var(--muted)'};">${bestellung===null?'·':bestellung}</td>
      </tr>`;
    });
    html+='</tbody></table></div></div>';
    html+=`<div style="font-size:11px;color:var(--muted);padding:4px 2px;">Negative Bestellung = Überbestand. Grün hinterlegtes Feld = heute aktualisiert.</div>`;
  }else{
    html+=`<div class="card"><div style="overflow-x:auto;"><table class="pack-table"><thead><tr><th>Produkt</th><th>Verpackung</th><th>Bestand</th><th style="text-align:left;">Einheit</th></tr></thead><tbody>`;
    KC_KITCHEN_ITEMS.forEach(r=>{html+=`<tr><td style="color:var(--muted);">${r.p}</td><td style="text-align:left;">${r.v}</td><td><input type="number" min="0" style="width:50px;text-align:center;border:1px solid var(--border);border-radius:4px;font-size:12px;padding:2px;" placeholder="${r.n}"></td><td style="text-align:left;font-size:11px;color:var(--muted);">${r.e}</td></tr>`;});
    html+='</tbody></table></div></div>';
  }
  el.innerHTML=html;
  translateEl(el);
}
function switchKCTab(t){kcTab=t;renderKCLager();}
function switchKCStore(id){kcLagerStoreId=id;renderKCLager();}
async function updateIstBestand(articleId, value){
  const today=new Date().toISOString().split('T')[0];
  const v=value===''?null:parseFloat(value);
  try{
    await api(`kc_stock?store_id=eq.${kcLagerStoreId}&article_id=eq.${articleId}`,{method:'DELETE'});
    if(v!==null){
      await api('kc_stock',{method:'POST',body:JSON.stringify([{store_id:kcLagerStoreId,article_id:articleId,ist_bestand:v,updated_date:today}])});
    }
    renderKCLager();
  }catch(e){showToast('Fehler beim Speichern');}
}
window.switchKCTab=switchKCTab;
window.switchKCStore=switchKCStore;
window.updateIstBestand=updateIstBestand;

// ---- LAGER ----
function renderLager(){
  const warn=articles.filter(a=>(stockData[a.id]||0)<(a.min_stock||4));
  const el=document.getElementById('v-lager');
  let html=`<div class="metric-grid">
    <div class="metric-card"><div style="font-size:11px;color:var(--muted);">Artikel gesamt</div><div style="font-size:26px;font-weight:600;">${articles.length}</div></div>
    <div class="metric-card"><div style="font-size:11px;color:var(--muted);">Nachbestellen</div><div style="font-size:26px;font-weight:600;color:${warn.length?'#A32D2D':'inherit'}">${warn.length}</div></div>
  </div>`;
  CATS.forEach(cat=>{
    const items=articles.filter(a=>a.category===cat);
    if(!items.length) return;
    html+=`<div class="section-lbl">${cat}</div><div class="card">`;
    items.forEach(a=>{const qty=stockData[a.id]||0;const low=qty<(a.min_stock||4);html+=`<div style="display:flex;align-items:center;padding:9px 14px;border-bottom:1px solid var(--border);"><span style="flex:1;font-size:14px;">${a.name}</span><span style="width:40px;text-align:center;font-size:13px;color:var(--muted);">${qty}</span><span class="badge ${low?'badge-warn':'badge-ok'}">${low?'nachbestellen':'ok'}</span></div>`;});
    html+='</div>';
  });
  el.innerHTML=html;
  translateEl(el);
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
window.addEventListener('online',()=>{});

initLogin().catch(console.error);
